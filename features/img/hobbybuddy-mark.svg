<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" fill="none" aria-hidden="true">
  <defs>
    <linearGradient id="hb-face-grad" x1="6" y1="8" x2="42" y2="42" gradientUnits="userSpaceOnUse">
      <stop stop-color="#6366f1"/>
      <stop offset="0.45" stop-color="#a855f7"/>
      <stop offset="1" stop-color="#fbbf24"/>
    </linearGradient>
    <linearGradient id="hb-spark-grad" x1="14" y1="10" x2="34" y2="28" gradientUnits="userSpaceOnUse">
      <stop stop-color="#fef3c7"/>
      <stop offset="1" stop-color="#ffffff"/>
    </linearGradient>
  </defs>
  <!-- Soft squircle: friendly, not sharp -->
  <rect width="48" height="48" rx="15" fill="url(#hb-face-grad)"/>
  <!-- Tiny journey sparkles (4 hafta / keşif) -->
  <circle cx="12" cy="14" r="2" fill="url(#hb-spark-grad)" opacity="0.95"/>
  <circle cx="37" cy="17" r="1.6" fill="url(#hb-spark-grad)" opacity="0.9"/>
  <circle cx="34" cy="11" r="1.2" fill="#fff" opacity="0.85"/>
  <!-- Buddy face: minimal, playful -->
  <circle cx="18.5" cy="21" r="2.4" fill="#fff" opacity="0.98"/>
  <circle cx="29.5" cy="21" r="2.4" fill="#fff" opacity="0.98"/>
  <path
    d="M17 27.5c2.2 2.8 5.3 4.3 7 4.3s4.8-1.5 7-4.3"
    stroke="#fff"
    stroke-width="2.2"
    stroke-linecap="round"
    fill="none"
    opacity="0.95"
  />
  <!-- Soft cheek warmth -->
  <ellipse cx="14.5" cy="24" rx="2" ry="1.2" fill="#fda4af" opacity="0.35"/>
  <ellipse cx="33.5" cy="24" rx="2" ry="1.2" fill="#fda4af" opacity="0.35"/>
</svg>
